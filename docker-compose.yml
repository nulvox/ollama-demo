x-ollama: &ollama-base
  image: ollama/ollama:latest
  container_name: ollama
  ports:
    - "127.0.0.1:11434:11434"
  volumes:
    - ollama_data:/root/.ollama
  restart: unless-stopped
  # Needed on Bazzite/Fedora for SELinux; harmless no-op on Ubuntu
  security_opt:
    - label=disable
  environment:
    - OLLAMA_HOST=0.0.0.0:11434

services:
  # CPU-only Ollama (default)
  ollama:
    <<: *ollama-base
    profiles:
      - cpu

  # GPU-accelerated Ollama (NVIDIA)
  ollama-gpu:
    <<: *ollama-base
    profiles:
      - gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=true
    restart: unless-stopped
    security_opt:
      - label=disable

volumes:
  ollama_data:
  webui_data:
